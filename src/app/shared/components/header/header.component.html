<header class="header">
  <div class="container nav-wrapper">
    <a routerLink="/" class="brand" (click)="closeMenu()">
      <img src="/JamiEnviosLogo1.png" alt="JamiEnvios" class="brand-logo" />
      <div class="brand-copy">
        <span class="brand-title">JamiEnvios</span>
        <span class="brand-subtitle">Envíos España - República Dominicana</span>
      </div>
    </a>

    <button class="menu-btn" type="button" (click)="toggleMenu()" aria-label="Abrir menú">
      ☰
    </button>

    <nav class="nav" [class.nav-open]="mobileMenuOpen">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="closeMenu()">
        Inicio
      </a>

      <a routerLink="/servicios" routerLinkActive="active" (click)="closeMenu()">
        Servicios
      </a>
      <a routerLink="/rastreo" routerLinkActive="active" (click)="closeMenu()">
        Rastreo
      </a>
      <a routerLink="/contacto" routerLinkActive="active" (click)="closeMenu()">
        Contacto
      </a>

      @if (isLoggedIn) {
        <a routerLink="/perfil" class="user-icon-link" aria-label="Mi perfil" title="Mi perfil" (click)="closeMenu()">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="user-icon">
            <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </a>
      } @else {
        <a routerLink="/login" class="user-icon-link" aria-label="Iniciar sesión o registrarse" title="Iniciar sesión" (click)="closeMenu()">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="user-icon">
            <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </a>
      }

      <a class="cta-link" routerLink="/contacto" (click)="closeMenu()">
        Solicita Cotización
      </a>
    </nav>
  </div>
</header>
